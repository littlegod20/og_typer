# Railway: set the service "Root Directory" to `server` (this folder).
# Add a PostgreSQL plugin and link it (sets DATABASE_URL).

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
